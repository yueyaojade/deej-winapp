# deej configuration
# Place this file next to deej.exe

# ─── Slider mapping ───────────────────────────────────────────────────
# Map each physical slider (0, 1, 2, ...) to the app(s) it controls.
# The number of sliders here should match your Arduino's NUM_SLIDERS.
#
# Special targets:
#   master          — system master volume
#   mic             — microphone input level
#   system          — Windows system sounds
#   deej.current    — currently active window (Windows only)
#   deej.unmapped   — all apps not assigned to any slider
#
# Groups: list multiple apps to control them with one slider:
#   3:
#     - chrome.exe
#     - firefox.exe
#
# Process names are case-insensitive.

slider_mapping:
  0: master
  1: chrome.exe
  2: spotify.exe
  3: discord.exe
  4: deej.unmapped
  5: deej.current
  6: obs64.exe
  7: mic

# ─── Serial connection ────────────────────────────────────────────────
# Find your COM port in Windows Device Manager under "Ports (COM & LPT)"

com_port: COM4
baud_rate: 9600

# ─── Slider behavior ──────────────────────────────────────────────────
# Set to true if moving a slider up lowers the volume
invert_sliders: false

# Noise reduction: "low" (clean hardware), "default", or "high" (noisy)
noise_reduction: default
