name: Build deej.exe

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install rsrc
        run: go install github.com/akavel/rsrc@latest

      - name: Generate Windows resources
        run: |
          rsrc -manifest pkg/deej/assets/deej.manifest -ico pkg/deej/assets/logo.ico -arch amd64 -o pkg/deej/cmd/rsrc_windows_amd64.syso

      - name: Build
        run: |
          go build -ldflags="-H windowsgui" -o deej.exe ./pkg/deej/cmd/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deej-winapp
          path: deej.exe
